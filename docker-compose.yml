services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ingester-binance:
    build:
      context: .
      args:
        CMD: ingester-binance
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      SYMBOLS: BTC-USDT,ETH-USDT,SOL-USDT
    restart: unless-stopped

  detector:
    build:
      context: .
      args:
        CMD: detector
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    restart: unless-stopped

  aggregator:
    build:
      context: .
      args:
        CMD: aggregator
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    restart: unless-stopped

  dashboard:
    build:
      context: .
      args:
        CMD: dashboard
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
